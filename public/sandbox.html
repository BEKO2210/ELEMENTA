<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!-- Defense-in-depth: Die maßgebliche CSP kommt als Header aus next.config.ts.
     Diese Meta-CSP spiegelt sie, falls Header unterwegs verloren gehen. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; style-src 'unsafe-inline'; img-src data:; font-src data:; connect-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bare-Specifier der kompilierten Svelte-Komponenten auf die selbst
     gehostete Runtime auflösen (eine Instanz — wichtig für Lifecycle-State). -->
<script type="importmap">
{"imports":{
  "svelte":"/vendor/svelte/src/runtime/index.js",
  "svelte/internal":"/vendor/svelte/src/runtime/internal/index.js",
  "svelte/internal/disclose-version":"/vendor/svelte/src/runtime/internal/disclose-version/index.js",
  "svelte/store":"/vendor/svelte/src/runtime/store/index.js",
  "svelte/transition":"/vendor/svelte/src/runtime/transition/index.js",
  "svelte/easing":"/vendor/svelte/src/runtime/easing/index.js",
  "svelte/motion":"/vendor/svelte/src/runtime/motion/index.js",
  "svelte/animate":"/vendor/svelte/src/runtime/animate/index.js"
}}
</script>
<style>
  html,body{margin:0;height:100%}
  body{display:grid;place-items:center;box-sizing:border-box;color:#fff;font-family:system-ui,sans-serif;padding:24px}
  #__stage{display:contents}
  body.fit{overflow:hidden;padding:8px}
  /* Stage füllt im Fit-Modus den Viewport: width:100%-Komponenten (Backgrounds)
     bekommen echte Breite, kleine Komponenten bleiben per Grid exakt mittig. */
  body.fit #__stage{display:grid;place-items:center;width:100%;height:100%;transform-origin:center center}
  .__err{max-width:90%;font:12px/1.5 ui-monospace,monospace;color:#ff8a7a;white-space:pre-wrap;word-break:break-word}
  .__ph{text-align:center;font-family:system-ui,sans-serif}
  .__ph b{display:block;font-size:15px;font-weight:600;color:#a78bfa;margin-bottom:8px}
  .__ph span{font-size:13px;line-height:1.5;color:#a6a29a}
</style>
<style id="__user-css"></style>
</head>
<body>
<div id="__stage"></div>
<script>
(function () {
  "use strict";

  var stage = document.getElementById("__stage");
  var userCss = document.getElementById("__user-css");
  var reactRoot = null;   // aktive React-Root zum sauberen Unmounten
  var vueApp = null;      // aktive Vue-App
  var svelteApp = null;   // aktive Svelte-Instanz
  var fitObserver = null;
  var seq = 0;            // schützt gegen Races bei schnellen Re-Renders

  /* ---------- Helfer ---------- */

  var loaded = {};
  function ensure(src) {
    if (!loaded[src]) {
      loaded[src] = new Promise(function (res, rej) {
        var s = document.createElement("script");
        s.src = src;
        s.onload = res;
        s.onerror = function () { rej(new Error("Skript konnte nicht geladen werden: " + src)); };
        document.head.appendChild(s);
      });
    }
    return loaded[src];
  }

  function detectComponentName(code) {
    var def = code.match(/export\s+default\s+function\s+([A-Z][A-Za-z0-9_]*)/);
    if (def) return def[1];
    var fns = code.match(/function\s+[A-Z][A-Za-z0-9_]*/g);
    if (fns && fns.length) return fns[fns.length - 1].replace(/^function\s+/, "");
    var cns = code.match(/const\s+[A-Z][A-Za-z0-9_]*\s*=/g);
    if (cns && cns.length) return cns[cns.length - 1].replace(/^const\s+/, "").replace(/\s*=$/, "");
    return "App";
  }

  // import/export entfernen — der Code läuft als klassisches Skript, nicht als Modul.
  function stripModuleSyntax(code) {
    return code
      .replace(/^\s*import[^\n]*$/gm, "")
      .replace(/export\s+default\s+/g, "")
      .replace(/^\s*export\s+/gm, "");
  }

  function showError(e) {
    var div = document.createElement("div");
    div.className = "__err";
    div.textContent = String(e && e.message ? e.message : e);
    stage.appendChild(div);
  }

  function showPlaceholder(title, text) {
    stage.innerHTML = "";
    var wrap = document.createElement("div");
    wrap.className = "__ph";
    var b = document.createElement("b");
    b.textContent = title;
    var s = document.createElement("span");
    s.innerHTML = text;
    wrap.appendChild(b);
    wrap.appendChild(s);
    stage.appendChild(wrap);
  }

  // Skaliert zu große Inhalte herunter (Karten-Thumbnails), damit nichts abgeschnitten wird.
  // Gemessen wird die VEREINIGUNG der Kind-Rechtecke (nicht die Stage): so zählen auch
  // absolut positionierte Überstände (Glows/Schatten) mit und alles bleibt sichtbar.
  function applyFit() {
    function contentRect() {
      var u = null;
      for (var i = 0; i < stage.children.length; i++) {
        var b = stage.children[i].getBoundingClientRect();
        if (b.width < 2 && b.height < 2) continue;
        if (!u) u = { left: b.left, top: b.top, right: b.right, bottom: b.bottom };
        else {
          u.left = Math.min(u.left, b.left);
          u.top = Math.min(u.top, b.top);
          u.right = Math.max(u.right, b.right);
          u.bottom = Math.max(u.bottom, b.bottom);
        }
      }
      var r = u || stage.getBoundingClientRect();
      return { left: r.left, top: r.top, width: r.right - r.left, height: r.bottom - r.top };
    }
    function f() {
      stage.style.transform = "none";
      var r = contentRect(), pad = 8;
      if (!(r.width > 0 && r.height > 0)) return;
      var s = Math.min(1, (window.innerWidth - pad) / r.width, (window.innerHeight - pad) / r.height);
      // Sichtbaren Inhalt exakt zentrieren: eigene Transforms der Komponente
      // (Tilt/Perspective) verschieben die visuelle Box gegenüber der Layout-Box.
      var st = stage.getBoundingClientRect();
      var cx = st.left + st.width / 2, cy = st.top + st.height / 2;      // Transform-Ursprung
      var vx = r.left + r.width / 2, vy = r.top + r.height / 2;          // visuelles Zentrum
      var tx = window.innerWidth / 2 - cx - s * (vx - cx);
      var ty = window.innerHeight / 2 - cy - s * (vy - cy);
      if (s < 1 || Math.abs(tx) > 1 || Math.abs(ty) > 1) {
        stage.style.transform = "translate(" + tx.toFixed(1) + "px," + ty.toFixed(1) + "px) scale(" + s + ")";
      }
    }
    requestAnimationFrame(f);
    setTimeout(f, 120);
    setTimeout(f, 450);
    if (window.ResizeObserver) {
      try {
        fitObserver = new ResizeObserver(f);
        fitObserver.observe(stage);
      } catch (e) {}
    }
  }

  // innerHTML führt <script>-Tags nicht aus — für HTML-Snippets mit Inline-JS nachziehen.
  function activateScripts(root) {
    var scripts = root.querySelectorAll("script");
    for (var i = 0; i < scripts.length; i++) {
      var old = scripts[i];
      var s = document.createElement("script");
      for (var j = 0; j < old.attributes.length; j++) {
        s.setAttribute(old.attributes[j].name, old.attributes[j].value);
      }
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    }
  }

  function resetStage() {
    if (reactRoot) { try { reactRoot.unmount(); } catch (e) {} reactRoot = null; }
    if (vueApp) { try { vueApp.unmount(); } catch (e) {} vueApp = null; }
    if (svelteApp) { try { svelteApp.$destroy(); } catch (e) {} svelteApp = null; }
    if (fitObserver) { try { fitObserver.disconnect(); } catch (e) {} fitObserver = null; }
    stage.style.transform = "none";
    stage.innerHTML = "";
  }

  /* ---------- Renderer pro Framework ---------- */

  function renderPlain(data) {
    userCss.textContent = data.css || "";
    stage.innerHTML = data.html || "";
    activateScripts(stage);
    if (data.js) {
      try { new Function(data.js)(); } catch (e) { showError(e); }
    }
  }

  function renderTailwind(data) {
    return ensure("/vendor/tailwind-play.js").then(function () {
      userCss.textContent = data.css || "";
      stage.innerHTML = data.html || "";
      activateScripts(stage);
      if (data.js) {
        try { new Function(data.js)(); } catch (e) { showError(e); }
      }
    });
  }

  function renderReact(data) {
    return Promise.all([
      ensure("/vendor/react.production.min.js"),
      ensure("/vendor/react-dom.production.min.js"),
    ])
      .then(function () { return ensure("/vendor/babel.min.js"); })
      .then(function () {
        userCss.textContent = data.css || "";
        var mount = document.createElement("div");
        stage.appendChild(mount);
        var code = stripModuleSyntax(data.html || "");
        var name = detectComponentName(code);
        var out = window.Babel.transform(code, { presets: ["react"] }).code;
        new Function("React", "__mount__", out + "\n;window.__lastComponent__=" + name + ";")(window.React, mount);
        reactRoot = window.ReactDOM.createRoot(mount);
        reactRoot.render(window.React.createElement(window.__lastComponent__));
      });
  }

  function renderVue(data) {
    return ensure("/vendor/vue.global.prod.js").then(function () {
      userCss.textContent = data.css || "";
      var mount = document.createElement("div");
      stage.appendChild(mount);

      var raw = data.html || "";
      var template = raw;
      var optionsSrc = data.js || "";

      // SFC-ähnliches Format: <template> / <script> / <style> aus einem Feld ziehen
      var tpl = raw.match(/<template[^>]*>([\s\S]*?)<\/template>/i);
      if (tpl) {
        template = tpl[1];
        var scr = raw.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
        if (scr && !optionsSrc) optionsSrc = scr[1];
        var sty = raw.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
        if (sty) userCss.textContent += "\n" + sty[1];
      }

      var options = {};
      if (optionsSrc && optionsSrc.trim()) {
        // "export default {…};" → "{…}" — als Objekt evaluieren (ohne End-Semikolon)
        var src = stripModuleSyntax(optionsSrc).trim().replace(/;+\s*$/, "");
        options = new Function("Vue", "return (" + src + ")")(window.Vue) || {};
      }
      options.template = template;
      vueApp = window.Vue.createApp(options);
      vueApp.config.errorHandler = function (e) { showError(e); };
      vueApp.mount(mount);
    });
  }

  function renderSvelte(data) {
    // Compiler (UMD → window.svelte) nur bei Bedarf laden, dann die .svelte-Datei
    // im Browser kompilieren und als Blob-ES-Modul mounten (Import-Map löst
    // svelte/internal & Co. auf die selbst gehostete Runtime auf).
    return ensure("/vendor/svelte/compiler.js").then(function () {
      userCss.textContent = data.css || "";
      var mount = document.createElement("div");
      stage.appendChild(mount);

      var out = window.svelte.compile(data.html || "", {
        generate: "dom",
        css: "injected",
        name: "Preview",
      });
      // data:-URL statt blob: — blob:null-Module sind in sandboxed iframes
      // (opaque origin) nicht importierbar. Import-Map gilt auch hier.
      var url = "data:text/javascript;charset=utf-8," + encodeURIComponent(out.js.code);
      return import(url).then(function (mod) {
        svelteApp = new mod.default({ target: mount });
      });
    });
  }

  /* ---------- Nachrichten-Protokoll ---------- */

  function render(data) {
    var mySeq = ++seq;
    resetStage();

    document.body.style.background =
      data.bg && data.bg !== "transparent" ? data.bg : "transparent";
    document.body.classList.toggle("fit", !!data.fit);

    var p;
    if (data.framework === "react") p = renderReact(data);
    else if (data.framework === "tailwind") p = renderTailwind(data);
    else if (data.framework === "vue") p = renderVue(data);
    else if (data.framework === "svelte") p = renderSvelte(data);
    else p = Promise.resolve(renderPlain(data));

    Promise.resolve(p)
      .then(function () {
        if (mySeq !== seq) return; // veralteter Render
        if (data.fit) applyFit();
      })
      .catch(function (e) {
        if (mySeq !== seq) return;
        showError(e);
      });
  }

  var gotPayload = false;

  window.addEventListener("message", function (e) {
    // Nur das direkte Elterndokument darf rendern lassen.
    if (e.source !== window.parent) return;
    var d = e.data;
    if (!d || d.type !== "elementa:render") return;
    gotPayload = true;
    try { render(d); } catch (err) { resetStage(); showError(err); }
  });

  // Handshake: "ready" wiederholt senden, bis Code ankommt — die Eltern-Seite
  // hydratisiert evtl. erst NACH dem iframe-Load (lazy iframes über dem Fold),
  // dann ginge eine einmalige Nachricht verloren.
  var tries = 0;
  (function announce() {
    if (gotPayload || tries++ > 80) return;
    window.parent.postMessage({ type: "elementa:ready" }, "*");
    setTimeout(announce, tries < 10 ? 120 : 500);
  })();
})();
</script>
</body>
</html>
