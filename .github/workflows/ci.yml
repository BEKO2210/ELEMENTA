# CI-Pipeline. Zwei Jobs:
#  build  = verpflichtendes Gate: Lint + Produktions-Build (deterministisch, kein Backend).
#  verify = E2E/axe/Link/Lighthouse gegen einen lokalen Build + Live-Appwrite (public read).
#           continue-on-error: läuft informativ, blockt aber nicht (auf gehosteten Runnern
#           mit Live-Backend/Secrets naturgemäß fragil). Lokal ist die Suite grün.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APPWRITE_ENDPOINT: https://appwrite.it-handwerk-stuttgart.de/v1
  NEXT_PUBLIC_APPWRITE_PROJECT: 6a4453770009b9e7f029
  NEXT_PUBLIC_SITE_URL: https://ui.it-handwerk-stuttgart.de

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build (Produktions-Build)
        run: npm run build

  verify:
    name: E2E & Audits (informativ)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Server starten
        run: |
          nohup npm run start >server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000 >/dev/null && break; sleep 2; done
          curl -sf -o /dev/null http://localhost:3000
      - name: Link-Audit (Sitemap, 404, Security-Header)
        run: node scripts/audit-links.mjs
      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium
      - name: axe-Audit (WCAG auf Seiten-Ebene)
        run: node scripts/audit-axe-pages.mjs
        env:
          CHROME_PATH: /usr/bin/google-chrome
      - name: Playwright-Kernflows
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          echo "127.0.0.1 ui.it-handwerk-stuttgart.de" | sudo tee -a /etc/hosts
          npx playwright test
      - name: Playwright-Traces bei Fehlern hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
      - name: Lighthouse-CI
        run: npx lhci autorun || true
      - name: Server-Log
        if: always()
        run: tail -50 server.log || true
