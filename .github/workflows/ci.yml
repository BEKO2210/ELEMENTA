# CI-Pipeline (T3 im Audit-Plan): Build + Lint + Link-Audit + axe + Playwright + Lighthouse.
# Läuft gegen einen lokalen Produktions-Build; Appwrite-Backend = Live-Instanz (public read).
# Bewusst KEINE Secrets nötig — Fork-PRs bleiben ungefährlich, Analytics/Newsletter
# degradieren serverseitig sauber ohne APPWRITE_API_KEY.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APPWRITE_ENDPOINT: https://appwrite.it-handwerk-stuttgart.de/v1
  NEXT_PUBLIC_APPWRITE_PROJECT: 6a4453770009b9e7f029

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Produktions-Build)
        run: npm run build

      - name: Server starten
        run: |
          nohup npm run start >server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000 >/dev/null && break; sleep 2; done
          curl -sf -o /dev/null http://localhost:3000

      - name: Link-Audit (Sitemap, 404, Security-Header)
        run: node scripts/audit-links.mjs

      - name: axe-Audit (WCAG auf Seiten-Ebene)
        run: node scripts/audit-axe-pages.mjs
        env:
          CHROME_PATH: /usr/bin/google-chrome

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium

      - name: Playwright-Kernflows
        # Auth-Flows laufen über den Produktions-Hostnamen (Appwrite-Platform-Check
        # + Secure-Cookies) — TLS-Proxy auf :3443 startet Playwright selbst.
        # APPWRITE_API_KEY (Repo-Secret) provisioniert Test-Nutzer serverseitig
        # und umgeht so das Rate-Limit; ohne Secret Fallback auf Registrierung.
        env:
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
        run: |
          echo "127.0.0.1 ui.it-handwerk-stuttgart.de" | sudo tee -a /etc/hosts
          npx playwright test

      - name: Playwright-Traces bei Fehlern hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      - name: Lighthouse-CI (Perf ≥ 90, A11y = 100)
        run: npx lhci autorun

      - name: Server-Log bei Fehlern anzeigen
        if: failure()
        run: tail -50 server.log || true
